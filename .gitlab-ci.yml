default:
  tags:
    - hb

stages:
  - build
  - release

variables:
  PACKAGE_NAME: php-class-generator

build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run compile
    - npx vsce package --allow-missing-repository
  artifacts:
    paths:
      - "*.vsix"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build
  before_script:
    - apk add --no-cache curl
  script:
    - VSIX_FILE=$(ls *.vsix)
    - echo "Uploading ${VSIX_FILE}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${VSIX_FILE}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${VSIX_FILE}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "PHP Class Generator $CI_COMMIT_TAG"
    assets:
      links:
        - name: "${PACKAGE_NAME}.vsix"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${PACKAGE_NAME}-${CI_COMMIT_TAG#v}.vsix"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
