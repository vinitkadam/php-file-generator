default:
  tags:
    - hb

variables:
  PACKAGE_NAME: php-class-generator

release:
  image: node:20
  before_script:
    - apt-get update && apt-get install -y curl
    - npm ci
  script:
    - npx vsce package --allow-missing-repository
    - VSIX_FILE=$(ls *.vsix)
    - echo "Uploading ${VSIX_FILE}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${VSIX_FILE}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${VSIX_FILE}"
    - VSIX_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${VSIX_FILE}"
    - echo "Download URL - ${VSIX_URL}"
    - |
      npx -y @gitlab-org/release-cli create --name "Release ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "PHP Class Generator ${CI_COMMIT_TAG}" \
        --assets-link "{\"name\":\"${VSIX_FILE}\",\"url\":\"${VSIX_URL}\",\"link_type\":\"package\"}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
